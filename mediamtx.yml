# MediaMTX config — Pi'den WHIP ile publish, browser'dan WHEP ile playback

# WebRTC (WHIP/WHEP) endpoint
webrtcAddress: :8889
webrtcEncryption: no
webrtcAllowOrigin: '*'

# Container içindeki internal IP yerine VM'in public IP'sini ICE candidate olarak ilan et
webrtcAdditionalHosts:
  - 34.28.199.163

# ICE UDP portu — Docker'da expose edilen porta sabitle
webrtcLocalUDPAddress: :8189

# RTSP (Pi alternatif olarak buradan da yayınlayabilir)
rtspAddress: :8554

# HTTP API kapalı
api: no

paths:
  camera:
    source: publisher
