services:
  backend:
    build:
      context: .
      dockerfile: web/backend/Dockerfile
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: web/frontend/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped
