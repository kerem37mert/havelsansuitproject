# HTTP -> HTTPS yönlendirme
server {
    listen 80;
    server_name havelsansuitproject.dev www.havelsansuitproject.dev api.havelsansuitproject.dev;
    return 301 https://$host$request_uri;
}

# Frontend
server {
    listen 443 ssl;
    server_name havelsansuitproject.dev www.havelsansuitproject.dev;

    ssl_certificate     /etc/letsencrypt/live/havelsansuitproject.dev-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/havelsansuitproject.dev-0001/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Backend WebSocket
server {
    listen 443 ssl;
    server_name api.havelsansuitproject.dev;

    ssl_certificate     /etc/letsencrypt/live/havelsansuitproject.dev-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/havelsansuitproject.dev-0001/privkey.pem;

    resolver 127.0.0.11 valid=10s;
    set $backend_upstream http://backend:8000;
    set $mediamtx_upstream http://mediamtx:8889;

    # MediaMTX — WHIP publish + WHEP playback
    location /camera {
        proxy_pass         $mediamtx_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Backend WebSocket (varsayılan)
    location / {
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400;
    }
}
