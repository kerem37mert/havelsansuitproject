server {
    listen 80;
    server_name havelsansuitproject.dev www.havelsansuitproject.dev;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA — bilinmeyen path'leri index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name api.havelsansuitproject.dev;

    # WebSocket proxy → backend container
    location / {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400;
    }
}
