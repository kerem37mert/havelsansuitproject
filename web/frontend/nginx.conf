server {
    listen 80;
    server_name havelsansuitproject.dev www.havelsansuitproject.dev;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA — bilinmeyen path'leri index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name api.havelsansuitproject.dev;

    # Docker internal DNS — backend çökmüşse nginx yine de başlar
    resolver 127.0.0.11 valid=10s;
    set $backend_upstream http://backend:8000;

    location / {
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400;
    }
}
